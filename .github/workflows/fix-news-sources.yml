name: Fix News Sources

on:
  workflow_dispatch:
    inputs:
      failed_sources:
        description: 'JSON with failedSources array and optional keyword'
        required: true
        type: string
      mimo_key:
        description: 'MIMO API Key (passed from Vercel)'
        required: true
        type: string

jobs:
  fix-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fix broken source URLs
        env:
          MIMO_API_KEY: *** inputs.mimo_key }}
        run: node scripts/fix-news-sources.js '${{ inputs.failed_sources }}'

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/config/sources.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: auto-correct broken news source URLs [skip ci]"
            git push
          fi
