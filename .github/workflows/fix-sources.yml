name: Fix News Sources
on:
  workflow_dispatch:
    inputs:
      failed_sources:
        description: "Failed sources JSON"
        required: true
      mimo_key:
        description: "MIMO API Key from Vercel"
        required: true

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Fix URLs
        env:
          MIMO_API_KEY: *** inputs.mimo_key }}
        run: node scripts/fix-news-sources.js '${{ inputs.failed_sources }}'
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/config/sources.json
          git diff --cached --quiet || git commit -m "fix: auto-correct news source URLs"
          git push
