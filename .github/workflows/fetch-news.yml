name: Fetch News

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from RSS and APIs
        run: node scripts/fetch-news.js
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

      - name: Commit and push
        run: |
          git config user.name "NEIN Bot"
          git config user.email "bot@nein.local"
          git add src/data/news.json
          git diff --cached --quiet || git commit -m "📰 Update news data $(date -u '+%Y-%m-%d %H:%M')"
          git push
